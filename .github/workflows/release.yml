name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          # webkit2gtk 4.1 + libsoup3: Fedora 40+, Ubuntu 24.04+, Arch, Debian trixie+
          - runner: ubuntu-latest
            arch: amd64
            devpkg: libwebkit2gtk-4.1-dev
            tags: webkit2_41
            suffix: linux-amd64-webkit2gtk41
          # webkit2gtk 4.0 + libsoup2: Ubuntu 22.04, Debian 12
          - runner: ubuntu-22.04
            arch: amd64
            devpkg: libwebkit2gtk-4.0-dev
            tags: ""
            suffix: linux-amd64-webkit2gtk40
          # arm64, webkit2gtk 4.1: Fedora/Ubuntu 24.04+ on arm64 (e.g. Raspberry Pi, Asahi)
          - runner: ubuntu-24.04-arm
            arch: arm64
            devpkg: libwebkit2gtk-4.1-dev
            tags: webkit2_41
            suffix: linux-arm64-webkit2gtk41
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - uses: oven-sh/setup-bun@v2

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev ${{ matrix.devpkg }}

      - name: Install wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build ${{ matrix.tags && format('-tags {0}', matrix.tags) || '' }}

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          DIST="pg-pilot-${VERSION}-${{ matrix.suffix }}"
          mkdir "$DIST"
          cp build/bin/pg-pilot "$DIST/"
          cp build/appicon.png "$DIST/"
          cp build/linux/pg-pilot.desktop "$DIST/"
          cp build/linux/install.sh "$DIST/"
          tar czf "${DIST}.tar.gz" "$DIST"

      - uses: actions/upload-artifact@v4
        with:
          name: pg-pilot-${{ matrix.suffix }}
          path: pg-pilot-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
